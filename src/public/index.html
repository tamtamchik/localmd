<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalMD</title>


  <!-- CodeMirror 5 (simpler CDN loading) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/overlay.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/gfm/gfm.min.js"></script>

  <!-- Marked for markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>LocalMD</h1>
        <button id="theme-toggle" class="icon-btn" title="Toggle dark mode">
          <span class="icon-sun">&#9788;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
      <div class="file-tree" id="file-tree">
        <div class="loading">Loading files...</div>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <span class="current-file" id="current-file">Select a file to edit</span>
        <div class="toolbar-actions">
          <span class="save-status" id="save-status"></span>
          <button id="save-btn" class="btn" disabled>Save</button>
        </div>
      </div>

      <div class="editor-container">
        <div class="editor-pane">
          <div id="editor"></div>
        </div>
        <div class="preview-pane">
          <div class="preview-content" id="preview">
            <div class="empty-state">
              <h2>Welcome to LocalMD</h2>
              <p>Select a markdown file from the sidebar to start editing.</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
