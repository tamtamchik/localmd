<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalMD</title>


  <!-- CodeMirror 5 (simpler CDN loading) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/overlay.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/gfm/gfm.min.js"></script>

  <!-- Marked for markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>LocalMD</h1>
        <button id="theme-toggle" class="icon-btn" title="Toggle dark mode">
          <span class="icon-sun">&#9788;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
      <div class="file-tree" id="file-tree">
        <div class="loading">Loading files...</div>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="file-status">
          <span class="current-file" id="current-file">Select a file to edit</span>
          <span class="save-status" id="save-status" role="status" aria-live="polite">
            <span class="visually-hidden" id="save-status-text"></span>
            <svg data-save-icon="saved" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 8.5l3 3 7-7" />
            </svg>
            <svg data-save-icon="unsaved" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="8" r="3" />
            </svg>
            <svg data-save-icon="saving" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="8" r="5.5" />
            </svg>
            <svg data-save-icon="error" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="8" r="6" />
              <path d="M8 4.5v4M8 11.5h.01" />
            </svg>
          </span>
        </div>
        <div class="toolbar-actions">
          <span class="file-history" id="file-history" hidden>
            <span class="author-avatars" id="author-avatars"></span>
            <span class="changed-text">Changed <time id="changed-at"></time></span>
          </span>
          <div class="view-switcher" role="group" aria-label="View mode">
            <button class="view-mode-btn" data-view-mode="editor" aria-label="Markdown" title="Markdown" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 20h4l11-11-4-4L4 16v4zM13.5 6.5l4 4" />
              </svg>
            </button>
            <button class="view-mode-btn active" data-view-mode="split" aria-label="Split" title="Split" aria-pressed="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="4" width="18" height="16" rx="1" />
                <path d="M12 4v16" />
              </svg>
            </button>
            <button class="view-mode-btn" data-view-mode="preview" aria-label="Preview" title="Preview" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z" />
                <circle cx="12" cy="12" r="2.5" />
              </svg>
            </button>
          </div>
          <button id="save-btn" class="btn" disabled>Save</button>
        </div>
      </div>

      <div class="editor-container" data-view-mode="split">
        <div class="editor-pane">
          <div id="editor"></div>
        </div>
        <div class="preview-pane">
          <div class="preview-content" id="preview">
            <div class="empty-state">
              <h2>Welcome to LocalMD</h2>
              <p>Select a markdown file from the sidebar to start editing.</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
